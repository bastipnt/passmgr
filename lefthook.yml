commit-msg:
  commands:
    lint-commit-msg:
      run: pnpm commitlint --edit
pre-commit:
  commands:
    gitleaks:
      tags: security audit
      run: gitleaks protect --staged --no-banner -v
pre-push:
  parallel: true
  commands:
    lint:
      tags: style
      run: pnpm lint
    check-format:
      tags: style
      run: pnpm format
    typecheck:
      tags: style
      run: pnpm typecheck
