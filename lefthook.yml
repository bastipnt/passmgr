commit-msg:
  commands:
    lint-commit-msg:
      run: pnpm dlx commitlint --edit
pre-commit:
  commands:
    gitleaks:
      tags: security audit
      run: gitleaks protect --staged --no-banner -v
pre-push:
  parallel: true
  commands:
    lint:
      tags: style
      run: pnpm lint
      glob: "*.{js,cjs,mjs,ts,jsx,tsx,json,css,md,yml,yaml,html}"
      stage_fixed: true
    check-format:
      tags: style
      run: pnpm format:fix-selected {staged_files}
      glob: "*.{js,cjs,mjs,ts,jsx,tsx,json,css,md,yml,yaml,html}"
      stage_fixed: true
    typecheck:
      tags: style
      run: pnpm typecheck
      glob: "*.{ts,tsx}"
