commit-msg:
  commands:
    lint-commit-msg:
      run: pnpm commitlint --edit

pre-commit:
  commands:
    gitleaks:
      tags: security audit
      run: gitleaks protect --staged --no-banner -v
    format:
      tags: style
      glob: "*.{ts,tsx,md}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true

pre-push:
  piped: true
  commands:
    1_lint:
      tags: style
      run: pnpm lint
    2_typecheck:
      tags: style
      run: pnpm typecheck
    3_test:
      tags: test
      run: pnpm test
