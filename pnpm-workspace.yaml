packages:
  - apps/*
  - packages/*
  - infra/*

catalog:
  "@cloudflare/opaque-ts": ^0.7.5
  "@hookform/resolvers": ^5.2.2
  "@tailwindcss/postcss": ^4.3.0
  "@tailwindcss/vite": ^4.3.0
  "@tamagui/babel-plugin": 2.0.0
  "@tamagui/metro-plugin": 2.0.0
  "@tanstack/react-query": ^5.100.11
  "@testcontainers/postgresql": ^12.0.0
  "@trpc/client": ^11.17.0
  "@trpc/server": ^11.17.0
  "@trpc/tanstack-react-query": ^11.17.0
  "@types/node": ^25.9.0
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.2
  "@vitest/coverage-v8": ^4.1.6
  drizzle-kit: 1.0.0-beta.15-859cf75
  drizzle-orm: 1.0.0-beta.15-859cf75
  drizzle-seed: 1.0.0-beta.15-859cf75
  fast-check: ^4.8.0
  lucide-react: ^1.16.0
  oxlint: ^1.66.0
  oxlint-tsgolint: ^0.23.0
  react: ^19.2.6
  react-dom: ^19.2.6
  react-hook-form: ^7.76.0
  react-icons: ^5.6.0
  react-native: 0.83.6
  react-native-reanimated: ~4.2.1
  react-native-safe-area-context: ~5.6.2
  tailwindcss: ^4.3.0
  tamagui: 2.0.0
  testcontainers: ^12.0.0
  typescript: ~6.0.3
  vite: 8.0.13
  vitest: ^4.1.6
  wouter: ^3.9.0
  zod: ^4.4.3

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - tamagui
  - "@tamagui/*"

nodeLinker: hoisted

onlyBuiltDependencies:
  - cpu-features
  - fallow
  - protobufjs
  - sharp
  - ssh

overrides:
  lightningcss: "1.30.1"
  # Expo SDK 55 expects worklets 0.7.4; without this a 0.8.3 copy hoists to the
  # root and the babel-preset-expo worklets plugin resolves it, mismatching the
  # 0.7.4 the app runs at runtime.
  react-native-worklets: "0.7.4"
