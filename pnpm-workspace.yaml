packages:
  - apps/*
  - packages/*
  - infra/*

catalog:
  "@cloudflare/opaque-ts": ^0.7.5
  "@expo/vector-icons": ^15.1.1
  "@hookform/resolvers": ^5.4.0
  "@tailwindcss/postcss": ^4.3.1
  "@tailwindcss/vite": ^4.3.1
  "@tamagui/babel-plugin": 2.3.0
  "@tamagui/metro-plugin": 2.3.0
  "@tamagui/lucide-icons-2": ^2.3.0
  "@tanstack/react-query": ^5.101.0
  "@testcontainers/postgresql": ^12.0.2
  "@trpc/client": ^11.17.0
  "@trpc/server": ^11.17.0
  "@trpc/tanstack-react-query": ^11.17.0
  "@types/node": ^25.9.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.2
  "@vitest/coverage-v8": ^4.1.8
  drizzle-kit: 1.0.0-beta.15-859cf75
  drizzle-orm: 1.0.0-beta.15-859cf75
  drizzle-seed: 1.0.0-beta.15-859cf75
  # Expo SDK 55 line — keep all on 55.0.x. The `overrides` below additionally
  # pin the transitive copies these drag in (catalog only governs direct deps).
  expo: ~55.0.25
  expo-blur: ~55.0.14
  expo-clipboard: ~55.0.13
  expo-constants: ~55.0.16
  expo-dev-client: ~55.0.35
  expo-font: ~55.0.8
  expo-haptics: ~55.0.14
  expo-image: ~55.0.10
  expo-linking: ~55.0.15
  expo-router: ~55.0.15
  expo-secure-store: ~55.0.14
  expo-splash-screen: ^55.0.21
  expo-sqlite: ~55.0.16
  expo-status-bar: ~55.0.6
  expo-symbols: ~55.0.9
  expo-web-browser: ~55.0.16
  fast-check: ^4.8.0
  lucide-react: ^1.18.0
  oxlint: ^1.69.0
  oxlint-tsgolint: ^0.23.0
  react: ^19.2.7
  react-dom: ^19.2.7
  react-hook-form: ^7.79.0
  react-icons: ^5.6.0
  react-native: 0.86.0
  react-native-reanimated: ~4.4.1
  react-native-safe-area-context: ~5.8.0
  tailwindcss: ^4.3.1
  tamagui: 2.3.0
  testcontainers: ^12.0.2
  typescript: ~6.0.3
  vite: 8.0.16
  vitest: ^4.1.8
  wouter: ^3.10.0
  zod: ^4.4.3

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - tamagui
  - "@tamagui/*"

nodeLinker: hoisted

onlyBuiltDependencies:
  - cpu-features
  - fallow
  - protobufjs
  - sharp
  - ssh

overrides:
  lightningcss: "1.30.1"
  # Expo SDK 55 expects worklets 0.7.4; without this a 0.8.3 copy hoists to the
  # root and the babel-preset-expo worklets plugin resolves it, mismatching the
  # 0.7.4 the app runs at runtime.
  react-native-worklets: "0.7.4"
  # Expo's loose peer ranges (and @repo/ui-native's `expo-router: "*"` peer) let
  # pnpm resolve SDK 56 copies of these into an SDK 55 app, dragging in the SDK 56
  # expo-modules-core ABI -> native NoSuchMethodError (SharedRef / AnyTypeCache).
  # Pin every expo package to the SDK 55 line.
  expo-router: "~55.0.15"
  expo-font: "~55.0.8"
  expo-image: "~55.0.10"
  expo-symbols: "~55.0.9"
  expo-glass-effect: "~55.0.11"
  "@expo/ui": "~55.0.17"
  "@expo/metro-runtime": "~55.0.11"
