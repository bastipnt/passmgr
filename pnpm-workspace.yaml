packages:
  - apps/*
  - packages/*
  - infra/*

allowBuilds:
  cpu-features: true
  esbuild: true
  fallow: true
  msw: true
  protobufjs: true
  ssh2: true

catalog:
  "@cloudflare/opaque-ts": ^0.7.5
  "@expo/vector-icons": ^15.1.1
  "@hookform/resolvers": ^5.4.0
  "@tailwindcss/postcss": ^4.3.1
  "@tailwindcss/vite": ^4.3.1
  "@tamagui/babel-plugin": 2.3.0
  "@tamagui/metro-plugin": 2.3.0
  "@tamagui/lucide-icons-2": ^2.3.0
  "@tanstack/react-query": ^5.101.0
  "@testcontainers/postgresql": ^12.0.2
  "@trpc/client": ^11.17.0
  "@trpc/server": ^11.17.0
  "@trpc/tanstack-react-query": ^11.17.0
  "@types/node": ^26.0.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.2
  "@vitest/coverage-v8": ^4.1.8
  drizzle-kit: 1.0.0-beta.15-859cf75
  drizzle-orm: 1.0.0-beta.15-859cf75
  drizzle-seed: 1.0.0-beta.15-859cf75
  # Expo SDK 55 line — keep all on 55.0.x. The `overrides` below additionally
  # pin the transitive copies these drag in (catalog only governs direct deps).
  expo: ~56.0.12
  expo-blur: ~56.0.3
  expo-clipboard: ~56.0.4
  expo-constants: ~56.0.18
  expo-dev-client: ~56.0.20
  expo-font: ~56.0.7
  expo-haptics: ~56.0.3
  expo-image: ~56.0.11
  expo-linking: ~56.0.14
  expo-router: ~56.2.11
  expo-secure-store: ~56.0.4
  expo-splash-screen: ^56.0.10
  expo-sqlite: ~56.0.5
  expo-status-bar: ~56.0.4
  expo-symbols: ~56.0.6
  expo-web-browser: ~56.0.5
  fast-check: ^4.8.0
  lucide-react: ^1.18.0
  oxlint: ^1.69.0
  oxlint-tsgolint: ^0.23.0
  react: 19.2.3
  react-dom: 19.2.3
  react-hook-form: ^7.79.0
  react-icons: ^5.6.0
  react-native: 0.85.3
  react-native-reanimated: ~4.3.1
  react-native-safe-area-context: ~5.7.0
  react-native-worklets: ^0.8.0
  tailwindcss: ^4.3.1
  tamagui: 2.3.0
  testcontainers: ^12.0.2
  typescript: ~6.0.3
  vite: 8.0.16
  vitest: ^4.1.8
  wouter: ^3.10.0
  zod: ^4.4.3

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - tamagui
  - "@tamagui/*"
  - "@expo/cli@56.1.16"
  - "@expo/config-plugins@56.0.9"
  - "@expo/config-types@56.0.6"
  - "@expo/inline-modules@0.0.12"
  - "@expo/prebuild-config@56.0.16"
  - expo-font@56.0.7
  - expo-modules-autolinking@56.0.16
  - expo-modules-core@56.0.17
  - expo-modules-jsi@56.0.10
  - expo@56.0.12
  - "@expo/ui@56.0.18"
  - expo-router@56.2.11

nodeLinker: hoisted

onlyBuiltDependencies:
  - cpu-features
  - fallow
  - protobufjs
  - sharp
  - ssh

overrides:
  # lightningcss: "1.30.1"
  # reanimated 4.4.x (RN 0.86) requires worklets 0.9.x (see compatibility.json).
  # Without this pin an older copy hoists to the root and RNReanimated.podspec
  # fails worklets version validation during prebuild.
  # react-native-worklets: "0.9.2"
  # Expo's loose peer ranges (and @repo/ui-native's `expo-router: "*"` peer) let
  # pnpm resolve SDK 56 copies of these into an SDK 55 app, dragging in the SDK 56
  # expo-modules-core ABI -> native NoSuchMethodError (SharedRef / AnyTypeCache).
  # Pin every expo package to the SDK 55 line.
  # expo-router: "~55.0.15"
  # expo-font: "~56.0.6"
  # expo-image: "~56.0.11"
  # expo-symbols: "~56.0.6"
  # expo-glass-effect: "~55.0.11"
  # "@expo/ui": "~55.0.17"
  "@expo/metro-runtime": "56.0.15"
  "@expo/dom-webview": "56.0.5"
  "@react-native/metro-config": "0.85.3"
  react-dom: "19.2.3"

patchedDependencies:
  react-native-argon2: patches/react-native-argon2.patch
