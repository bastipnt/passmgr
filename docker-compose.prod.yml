services:
  web:
    image: ghcr.io/${GHCR_OWNER}/pass-mgr-web:${IMAGE_TAG:-latest}
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      - server
    restart: unless-stopped

  server:
    image: ghcr.io/${GHCR_OWNER}/pass-mgr-server:${IMAGE_TAG:-latest}
    environment:
      - DATABASE_URL=postgres://passmgr:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-passmgr}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPAQUE_SERVER_SETUP=${OPAQUE_SERVER_SETUP}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - REGISTRATION_DISABLED=${REGISTRATION_DISABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=passmgr
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-passmgr}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U passmgr"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
