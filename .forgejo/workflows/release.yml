name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: web
            dockerfile: Dockerfile.web
          - name: server
            dockerfile: Dockerfile.server
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - uses: https://github.com/docker/setup-buildx-action@v3

      - uses: https://github.com/docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - id: meta
        uses: https://github.com/docker/metadata-action@v5
        with:
          images: ghcr.io/${{ secrets.GHCR_NAMESPACE }}/passmgr-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: https://github.com/docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ secrets.GHCR_NAMESPACE }}/passmgr-${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ secrets.GHCR_NAMESPACE }}/passmgr-${{ matrix.name }}:buildcache,mode=max
          platforms: linux/amd64

  deploy:
    needs: build
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-latest
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: SSH deploy
        uses: https://github.com/appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: GITHUB_REF_NAME,DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            export IMAGE_TAG="$GITHUB_REF_NAME"
            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            docker image prune -f
