name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: codeberg-medium
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: web
            dockerfile: Dockerfile.web
          - name: server
            dockerfile: Dockerfile.server
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - id: meta
        uses: https://github.com/docker/metadata-action@v5
        with:
          images: ghcr.io/${{ secrets.GHCR_NAMESPACE }}/passmgr-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Install buildah
        run: apt-get update && apt-get install -y buildah ca-certificates

      - name: Registry login
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: buildah login -u "$GHCR_USERNAME" -p "$GHCR_TOKEN" ghcr.io

      - name: Build and push
        env:
          IMAGE: ghcr.io/${{ secrets.GHCR_NAMESPACE }}/passmgr-${{ matrix.name }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          buildah bud --platform linux/amd64 -f "$DOCKERFILE" -t "$IMAGE:build" .
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            buildah tag "$IMAGE:build" "$tag"
            buildah push "$tag"
          done <<< "$TAGS"

  deploy:
    needs: build
    runs-on: codeberg-medium
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: SSH deploy
        uses: https://github.com/appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: GITHUB_REF_NAME,DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            export IMAGE_TAG="${GITHUB_REF_NAME#v}"
            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            docker image prune -f
